<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodRanked Header Preview</title>
  <style>
    :root {
      --bg-top: #1b2030;
      --bg-bottom: #121724;
      --chrome: #2e3649;
      --text: #f7f3e8;
      --muted: #d0c6b8;
      --header-scale: 3;
      --header-width: calc(135px * var(--header-scale));
      --header-height: calc(240px * var(--header-scale));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #1a1f2b 0%, #11151d 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    .wrap {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .phone {
      width: 420px;
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      border: 6px solid var(--chrome);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      background:
        radial-gradient(circle at top, rgba(213, 90, 90, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: grid;
      place-items: start center;
      padding-top: 18px;
    }

    .header-canvas {
      position: relative;
      width: var(--header-width);
      height: var(--header-height);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .sprite {
      position: absolute;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
    }

    .food-image {
      left: calc(6px * var(--header-scale));
      top: calc(18px * var(--header-scale));
      width: calc(33px * var(--header-scale));
      height: calc(33px * var(--header-scale));
      z-index: 2;
    }

    .food-plate {
      left: 0;
      top: calc(10px * var(--header-scale));
      width: calc(45px * var(--header-scale));
      height: calc(50px * var(--header-scale));
      z-index: 1;
    }

    .food-name-line {
      left: calc(43px * var(--header-scale));
      top: calc(18px * var(--header-scale));
      width: calc(52px * var(--header-scale));
      height: calc(12px * var(--header-scale));
      z-index: 1;
    }

    .type-plate {
      left: calc(45px * var(--header-scale));
      top: calc(33px * var(--header-scale));
      width: calc(38px * var(--header-scale));
      height: calc(12px * var(--header-scale));
      z-index: 1;
    }

    .per-100g-line {
      left: calc(45px * var(--header-scale));
      top: calc(47px * var(--header-scale));
      width: calc(34px * var(--header-scale));
      height: calc(10px * var(--header-scale));
      z-index: 1;
    }

    .calorie-bubble {
      right: 0;
      top: calc(12px * var(--header-scale));
      width: calc(40px * var(--header-scale));
      height: calc(44px * var(--header-scale));
      z-index: 1;
    }

    .score-plate {
      right: calc(2px * var(--header-scale));
      top: calc(60px * var(--header-scale));
      width: calc(33px * var(--header-scale));
      height: calc(10px * var(--header-scale));
      z-index: 1;
    }

    .header-text {
      position: absolute;
      z-index: 3;
      margin: 0;
      color: #f7f3e8;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(18, 23, 36, 0.8);
      white-space: nowrap;
    }

    .food-name-text {
      left: calc(48px * var(--header-scale));
      top: calc(21px * var(--header-scale));
      font-size: calc(5px * var(--header-scale));
      max-width: calc(42px * var(--header-scale));
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food-type-text {
      left: calc(51px * var(--header-scale));
      top: calc(36px * var(--header-scale));
      font-size: calc(4px * var(--header-scale));
      color: #fff2df;
      text-transform: capitalize;
    }

    .basis-text {
      left: calc(50px * var(--header-scale));
      top: calc(49px * var(--header-scale));
      font-size: calc(3.5px * var(--header-scale));
      color: var(--muted);
      text-transform: lowercase;
    }

    .kcal-value {
      right: calc(9px * var(--header-scale));
      top: calc(22px * var(--header-scale));
      width: calc(22px * var(--header-scale));
      text-align: center;
      font-size: calc(8px * var(--header-scale));
      font-weight: 800;
    }

    .kcal-label {
      right: calc(9px * var(--header-scale));
      top: calc(31px * var(--header-scale));
      width: calc(22px * var(--header-scale));
      text-align: center;
      font-size: calc(3px * var(--header-scale));
      color: var(--muted);
      text-transform: lowercase;
    }

    .note {
      max-width: 720px;
      text-align: center;
      color: #b8b3a7;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="phone">
      <div class="header-canvas" aria-label="FoodRanked header preview">
        <img class="sprite food-plate" src="./sprites/header/food_image_plate/meat_food_plate.png" alt="" />
        <img class="sprite food-image" src="./sprites/header/food_images/bacon.png" alt="Bacon pixel art" />
        <img class="sprite food-name-line" src="./sprites/header/header_ui/food_name_line.png" alt="" />
        <img class="sprite type-plate" src="./sprites/header/food_type_plate/meat_type_plate.png" alt="" />
        <img class="sprite per-100g-line" src="./sprites/header/header_ui/per_100g_line.png" alt="" />
        <img class="sprite calorie-bubble" src="./sprites/header/calorie_bubble/meat_calorie_bubble.png" alt="" />
        <img class="sprite score-plate" src="./sprites/header/header_ui/score_plate.png" alt="" />

        <p class="header-text food-name-text">Bacon</p>
        <p class="header-text food-type-text">Meat</p>
        <p class="header-text basis-text">per 100g</p>
        <p class="header-text kcal-value">541</p>
        <p class="header-text kcal-label">kcal</p>
      </div>
    </div>
    <div class="note">Header-only preview in the main app entry, using the meat asset set on the 135×240 authored grid.</div>
  </div>
</body>
</html>
