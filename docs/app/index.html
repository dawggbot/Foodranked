<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodRanked Header Preview</title>
  <style>
    :root {
      --bg-top: #1b2030;
      --bg-bottom: #121724;
      --chrome: #2e3649;
      --text: #f7f3e8;
      --muted: #d0c6b8;
      --preview-scale: 3;
      --asset-scale-down: 0.1;
      --grid-width: 135px;
      --grid-height: 240px;
      --header-width: calc(var(--grid-width) * var(--preview-scale));
      --header-height: calc(var(--grid-height) * var(--preview-scale));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 18px;
      overflow: auto;
      background: linear-gradient(180deg, #1a1f2b 0%, #11151d 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    .header-stage {
      width: calc(var(--header-width) + 48px);
      min-height: calc(var(--header-height) + 48px);
      padding: 24px;
      border: 6px solid var(--chrome);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      background:
        radial-gradient(circle at top, rgba(213, 90, 90, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: visible;
    }

    .header-canvas {
      position: relative;
      width: var(--header-width);
      height: var(--header-height);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .sprite,
    .header-text {
      position: absolute;
      transform-origin: top left;
    }

    .sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
      transform: scale(calc(var(--preview-scale) * var(--asset-scale-down)));
    }

    .food-plate { left: calc(3px * var(--preview-scale)); top: calc(7px * var(--preview-scale)); z-index: 1; }
    .food-image { left: calc(15px * var(--preview-scale)); top: calc(11px * var(--preview-scale)); z-index: 2; }
    .food-name-line { left: calc(22px * var(--preview-scale)); top: calc(45px * var(--preview-scale)); z-index: 1; }
    .calorie-bubble { left: calc(28px * var(--preview-scale)); top: calc(34px * var(--preview-scale)); z-index: 1; }
    .score-plate { left: calc(33px * var(--preview-scale)); top: calc(60px * var(--preview-scale)); z-index: 1; }
    .type-plate { left: calc(30px * var(--preview-scale)); top: calc(96px * var(--preview-scale)); z-index: 1; }
    .per-100g-line { left: calc(25px * var(--preview-scale)); top: calc(108px * var(--preview-scale)); z-index: 1; }

    .header-text {
      z-index: 3;
      margin: 0;
      color: #f7f3e8;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(18, 23, 36, 0.85);
    }

    .food-name-text {
      left: calc(27px * var(--preview-scale));
      top: calc(36px * var(--preview-scale));
      font-size: calc(7px * var(--preview-scale));
      max-width: calc(72px * var(--preview-scale));
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kcal-value {
      left: calc(42px * var(--preview-scale));
      top: calc(44px * var(--preview-scale));
      width: calc(15px * var(--preview-scale));
      text-align: center;
      font-size: calc(7px * var(--preview-scale));
      font-weight: 800;
    }

    .kcal-label {
      left: calc(43px * var(--preview-scale));
      top: calc(52px * var(--preview-scale));
      width: calc(14px * var(--preview-scale));
      text-align: center;
      font-size: calc(3px * var(--preview-scale));
      color: var(--muted);
      text-transform: lowercase;
    }

    .food-type-text {
      left: calc(36px * var(--preview-scale));
      top: calc(100px * var(--preview-scale));
      font-size: calc(5px * var(--preview-scale));
      color: #fff2df;
      text-transform: capitalize;
    }

    .basis-text {
      left: calc(31px * var(--preview-scale));
      top: calc(103px * var(--preview-scale));
      font-size: calc(4px * var(--preview-scale));
      color: var(--muted);
      text-transform: lowercase;
    }

    .note {
      max-width: 960px;
      text-align: center;
      color: #b8b3a7;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="header-stage">
    <div class="header-canvas" aria-label="FoodRanked header preview">
      <img class="sprite food-plate" src="./sprites/header/food_image_plate/meat_food_plate.png" alt="" />
      <img class="sprite food-image" src="./sprites/header/food_images/bacon.png" alt="Bacon pixel art" />
      <img class="sprite food-name-line" src="./sprites/header/header_ui/food_name_line.png" alt="" />
      <img class="sprite calorie-bubble" src="./sprites/header/calorie_bubble/meat_calorie_bubble.png" alt="" />
      <img class="sprite score-plate" src="./sprites/header/header_ui/score_plate.png" alt="" />
      <img class="sprite type-plate" src="./sprites/header/food_type_plate/meat_type_plate.png" alt="" />
      <img class="sprite per-100g-line" src="./sprites/header/header_ui/per_100g_line.png" alt="" />

      <p class="header-text food-name-text">Bacon</p>
      <p class="header-text kcal-value">541</p>
      <p class="header-text kcal-label">kcal</p>
      <p class="header-text food-type-text">Meat</p>
      <p class="header-text basis-text">per 100g</p>
    </div>
  </div>
  <div class="note">Header-only preview with the canvas back at normal preview size and the 1000% exported sprites scaled back down to their intended native grid size.</div>
</body>
</html>
