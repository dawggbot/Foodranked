<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodRanked Header Preview</title>
  <style>
    :root {
      --bg-top: #d8d8d8;
      --bg-bottom: #c9c9c9;
      --chrome: #9a9a9a;
      --text: #f7f3e8;
      --muted: #d0c6b8;
      --preview-scale: 3;
      --asset-scale-down: 0.1;
      --grid-width: 135px;
      --grid-height: 240px;
      --header-width: calc(var(--grid-width) * var(--preview-scale));
      --header-height: calc(var(--grid-height) * var(--preview-scale));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 18px;
      overflow: auto;
      background: #d3d3d3;
      color: #2a2a2a;
      font-family: Inter, system-ui, sans-serif;
    }

    .header-stage {
      width: calc(var(--header-width) + 48px);
      min-height: calc(var(--header-height) + 48px);
      padding: 24px;
      border: 2px solid var(--chrome);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: visible;
    }

    .header-canvas {
      position: relative;
      width: var(--header-width);
      height: var(--header-height);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .sprite {
      position: absolute;
      transform-origin: top left;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
      transform: scale(calc(var(--preview-scale) * var(--asset-scale-down)));
    }

    .header-text {
      position: absolute;
      z-index: 3;
      margin: 0;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      font-weight: 700;
      transform-origin: top left;
    }

    /* exact sprite anchors from the 135x240 grid */
    .food-plate { left: calc(3px * var(--preview-scale)); top: calc(7px * var(--preview-scale)); z-index: 1; }
    .food-image { left: calc(15px * var(--preview-scale)); top: calc(11px * var(--preview-scale)); z-index: 2; }
    .food-name-line { left: calc(22px * var(--preview-scale)); top: calc(45px * var(--preview-scale)); z-index: 1; }
    .calorie-bubble { left: calc(28px * var(--preview-scale)); top: calc(34px * var(--preview-scale)); z-index: 1; }
    .score-plate { left: calc(33px * var(--preview-scale)); top: calc(60px * var(--preview-scale)); z-index: 1; }
    .type-plate { left: calc(30px * var(--preview-scale)); top: calc(96px * var(--preview-scale)); z-index: 1; }
    .per-100g-line { left: calc(25px * var(--preview-scale)); top: calc(108px * var(--preview-scale)); z-index: 1; }

    /* text aligned relative to underline/chip intent, not centered inside fake boxes */
    .food-name-text {
      left: calc(23px * var(--preview-scale));
      top: calc(38px * var(--preview-scale));
      font-size: calc(6px * var(--preview-scale));
      color: #f5ead8;
      text-shadow: 0 calc(1px * var(--preview-scale)) 0 rgba(54, 35, 25, 0.45);
      text-transform: uppercase;
    }

    .kcal-value {
      left: calc(34px * var(--preview-scale));
      top: calc(40px * var(--preview-scale));
      width: calc(11px * var(--preview-scale));
      text-align: center;
      font-size: calc(6px * var(--preview-scale));
      font-weight: 800;
      color: #fff2df;
      text-shadow: 0 calc(1px * var(--preview-scale)) 0 rgba(54, 35, 25, 0.45);
    }

    .kcal-label {
      left: calc(34px * var(--preview-scale));
      top: calc(47px * var(--preview-scale));
      width: calc(11px * var(--preview-scale));
      text-align: center;
      font-size: calc(2.4px * var(--preview-scale));
      color: #f3e0c7;
      text-transform: lowercase;
    }

    .score-label-text {
      left: calc(34px * var(--preview-scale));
      top: calc(62px * var(--preview-scale));
      font-size: calc(3.2px * var(--preview-scale));
      color: #fff0d8;
      text-transform: lowercase;
      letter-spacing: 0;
    }

    .food-type-text {
      left: calc(34px * var(--preview-scale));
      top: calc(101px * var(--preview-scale));
      font-size: calc(5px * var(--preview-scale));
      color: #fff2df;
      text-transform: capitalize;
      text-shadow: 0 calc(1px * var(--preview-scale)) 0 rgba(54, 35, 25, 0.35);
    }

    .basis-text {
      left: calc(26px * var(--preview-scale));
      top: calc(101px * var(--preview-scale));
      font-size: calc(3.6px * var(--preview-scale));
      color: #6b6058;
      text-transform: lowercase;
    }

    .note {
      max-width: 960px;
      text-align: center;
      color: #5b5b5b;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="header-stage">
    <div class="header-canvas" aria-label="FoodRanked header preview">
      <img class="sprite food-plate" src="./sprites/header/food_image_plate/meat_food_plate.png" alt="" />
      <img class="sprite food-image" src="./sprites/header/food_images/bacon.png" alt="Bacon pixel art" />
      <img class="sprite food-name-line" src="./sprites/header/header_ui/food_name_line.png" alt="" />
      <img class="sprite calorie-bubble" src="./sprites/header/calorie_bubble/meat_calorie_bubble.png" alt="" />
      <img class="sprite score-plate" src="./sprites/header/header_ui/score_plate.png" alt="" />
      <img class="sprite type-plate" src="./sprites/header/food_type_plate/meat_type_plate.png" alt="" />
      <img class="sprite per-100g-line" src="./sprites/header/header_ui/per_100g_line.png" alt="" />

      <p class="header-text food-name-text">BACON</p>
      <p class="header-text kcal-value">541</p>
      <p class="header-text kcal-label">kcal</p>
      <p class="header-text score-label-text">score:</p>
      <p class="header-text food-type-text">Meat</p>
      <p class="header-text basis-text">per 100g</p>
    </div>
  </div>
  <div class="note">Header-only preview with sprite anchors matched to the true 10x export sizes and text positioned relative to the underline/chip reference intent.</div>
</body>
</html>
