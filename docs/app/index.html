<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodRanked Header Preview</title>
  <style>
    :root {
      --bg-top: #1b2030;
      --bg-bottom: #121724;
      --chrome: #2e3649;
      --text: #f7f3e8;
      --muted: #d0c6b8;
      --header-scale: 10;
      --grid-width: 135px;
      --grid-height: 240px;
      --header-width: calc(var(--grid-width) * var(--header-scale));
      --header-height: calc(var(--grid-height) * var(--header-scale));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 18px;
      overflow: auto;
      background: linear-gradient(180deg, #1a1f2b 0%, #11151d 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    .header-stage {
      width: calc(var(--header-width) + 48px);
      min-height: calc(var(--header-height) + 48px);
      padding: 24px;
      border: 6px solid var(--chrome);
      border-radius: 26px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      background:
        radial-gradient(circle at top, rgba(213, 90, 90, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      overflow: visible;
    }

    .header-canvas {
      position: relative;
      width: var(--header-width);
      height: var(--header-height);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .sprite,
    .header-text {
      position: absolute;
      transform-origin: top left;
      transform: scale(var(--header-scale));
    }

    .sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
    }

    .food-plate { left: 3px; top: 7px; z-index: 1; }
    .food-image { left: 15px; top: 11px; z-index: 2; }
    .food-name-line { left: 22px; top: 45px; z-index: 1; }
    .calorie-bubble { left: 28px; top: 34px; z-index: 1; }
    .score-plate { left: 33px; top: 60px; z-index: 1; }
    .type-plate { left: 30px; top: 96px; z-index: 1; }
    .per-100g-line { left: 25px; top: 108px; z-index: 1; }

    .header-text {
      z-index: 3;
      margin: 0;
      color: #f7f3e8;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(18, 23, 36, 0.85);
    }

    .food-name-text {
      left: 27px;
      top: 36px;
      font-size: 7px;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kcal-value {
      left: 42px;
      top: 44px;
      width: 15px;
      text-align: center;
      font-size: 7px;
      font-weight: 800;
    }

    .kcal-label {
      left: 43px;
      top: 52px;
      width: 14px;
      text-align: center;
      font-size: 3px;
      color: var(--muted);
      text-transform: lowercase;
    }

    .food-type-text {
      left: 36px;
      top: 100px;
      font-size: 5px;
      color: #fff2df;
      text-transform: capitalize;
    }

    .basis-text {
      left: 31px;
      top: 103px;
      font-size: 4px;
      color: var(--muted);
      text-transform: lowercase;
    }

    .note {
      max-width: 960px;
      text-align: center;
      color: #b8b3a7;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="header-stage">
    <div class="header-canvas" aria-label="FoodRanked header preview">
      <img class="sprite food-plate" src="./sprites/header/food_image_plate/meat_food_plate.png" alt="" />
      <img class="sprite food-image" src="./sprites/header/food_images/bacon.png" alt="Bacon pixel art" />
      <img class="sprite food-name-line" src="./sprites/header/header_ui/food_name_line.png" alt="" />
      <img class="sprite calorie-bubble" src="./sprites/header/calorie_bubble/meat_calorie_bubble.png" alt="" />
      <img class="sprite score-plate" src="./sprites/header/header_ui/score_plate.png" alt="" />
      <img class="sprite type-plate" src="./sprites/header/food_type_plate/meat_type_plate.png" alt="" />
      <img class="sprite per-100g-line" src="./sprites/header/header_ui/per_100g_line.png" alt="" />

      <p class="header-text food-name-text">Bacon</p>
      <p class="header-text kcal-value">541</p>
      <p class="header-text kcal-label">kcal</p>
      <p class="header-text food-type-text">Meat</p>
      <p class="header-text basis-text">per 100g</p>
    </div>
  </div>
  <div class="note">Header-only preview at a full 1000% canvas scale for inspection. The entire 135×240 grid is now visible without phone-frame clipping.</div>
</body>
</html>
