<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodRanked Header Preview</title>
  <style>
    :root {
      --bg: #d3d3d3;
      --preview-scale: 3;
      --asset-scale-down: 0.1;
      --grid-width: 135px;
      --grid-height: 240px;
      --header-width: calc(var(--grid-width) * var(--preview-scale));
      --header-height: calc(var(--grid-height) * var(--preview-scale));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 18px;
      background: var(--bg);
      color: #2a2a2a;
      font-family: Inter, system-ui, sans-serif;
    }

    .header-stage {
      width: calc(var(--header-width) + 48px);
      min-height: calc(var(--header-height) + 48px);
      padding: 24px;
      background: var(--bg);
      overflow: visible;
    }

    .header-canvas {
      position: relative;
      width: var(--header-width);
      height: var(--header-height);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .sprite {
      position: absolute;
      transform-origin: top left;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      -webkit-user-drag: none;
      transform: scale(calc(var(--preview-scale) * var(--asset-scale-down)));
    }

    .header-text {
      position: absolute;
      z-index: 3;
      margin: 0;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      font-weight: 700;
      text-transform: uppercase;
      color: #111;
      transform-origin: top left;
    }

    /* reference-matched composition */
    .food-plate { left: calc(3px * var(--preview-scale)); top: calc(7px * var(--preview-scale)); z-index: 1; }
    .food-image { left: calc(15px * var(--preview-scale)); top: calc(11px * var(--preview-scale)); z-index: 2; }
    .food-name-line { left: calc(45px * var(--preview-scale)); top: calc(44px * var(--preview-scale)); z-index: 1; }
    .calorie-bubble { left: calc(28px * var(--preview-scale)); top: calc(34px * var(--preview-scale)); z-index: 2; }
    .score-plate { left: calc(59px * var(--preview-scale)); top: calc(45px * var(--preview-scale)); z-index: 1; }
    .type-plate { left: calc(99px * var(--preview-scale)); top: calc(45px * var(--preview-scale)); z-index: 1; }
    .per-100g-line { left: calc(108px * var(--preview-scale)); top: calc(47px * var(--preview-scale)); z-index: 1; }

    .food-name-text {
      left: calc(45px * var(--preview-scale));
      top: calc(10px * var(--preview-scale));
      font-size: calc(14px * var(--preview-scale));
      color: #111;
    }

    .kcal-value {
      left: calc(33px * var(--preview-scale));
      top: calc(36px * var(--preview-scale));
      width: calc(19px * var(--preview-scale));
      text-align: center;
      font-size: calc(9px * var(--preview-scale));
      font-weight: 800;
      color: #111;
    }

    .kcal-label {
      left: calc(35px * var(--preview-scale));
      top: calc(48px * var(--preview-scale));
      width: calc(15px * var(--preview-scale));
      text-align: center;
      font-size: calc(8px * var(--preview-scale));
      color: #111;
    }

    .score-label-text {
      left: calc(64px * var(--preview-scale));
      top: calc(47px * var(--preview-scale));
      font-size: calc(9px * var(--preview-scale));
      color: #111;
    }

    .food-type-text {
      left: calc(106px * var(--preview-scale));
      top: calc(47px * var(--preview-scale));
      font-size: calc(9px * var(--preview-scale));
      color: #111;
    }

    .basis-text {
      left: calc(109px * var(--preview-scale));
      top: calc(14px * var(--preview-scale));
      font-size: calc(10px * var(--preview-scale));
      color: #111;
      line-height: 0.9;
      white-space: normal;
      text-align: center;
      width: calc(18px * var(--preview-scale));
    }

    .note {
      max-width: 960px;
      text-align: center;
      color: #5b5b5b;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="header-stage">
    <div class="header-canvas" aria-label="FoodRanked header preview">
      <img class="sprite food-plate" src="./sprites/header/food_image_plate/meat_food_plate.png" alt="" />
      <img class="sprite food-image" src="./sprites/header/food_images/bacon.png" alt="Bacon pixel art" />
      <img class="sprite food-name-line" src="./sprites/header/header_ui/food_name_line.png" alt="" />
      <img class="sprite calorie-bubble" src="./sprites/header/calorie_bubble/meat_calorie_bubble.png" alt="" />
      <img class="sprite score-plate" src="./sprites/header/header_ui/score_plate.png" alt="" />
      <img class="sprite type-plate" src="./sprites/header/food_type_plate/meat_type_plate.png" alt="" />
      <img class="sprite per-100g-line" src="./sprites/header/header_ui/per_100g_line.png" alt="" />

      <p class="header-text food-name-text">BACON</p>
      <p class="header-text kcal-value">+17</p>
      <p class="header-text kcal-label">KCAL</p>
      <p class="header-text score-label-text">SCORE: ???</p>
      <p class="header-text food-type-text">MEATS</p>
      <p class="header-text basis-text">PER<br>100g</p>
    </div>
  </div>
  <div class="note">Reference-matched header pass using the visible composition from the provided header reference image rather than the earlier guessed text offsets.</div>
</body>
</html>
