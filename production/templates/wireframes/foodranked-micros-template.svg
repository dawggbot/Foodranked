  <rect x="80" y="1320" width="920" height="180" rx="28" fill="#0f172a" stroke="#60a5fa" stroke-width="3" opacity="0.95"/>
  <text class="text" x="230" y="1410">Subtitle safe zone for vitamins/minerals</text>

  <g transform="translate(414,1710)">
    <circle cx="13" cy="13" r="13" fill="#4b5563"/><circle cx="59" cy="13" r="13" fill="#4b5563"/><circle cx="105" cy="13" r="13" fill="#4b5563"/><circle cx="151" cy="13" r="13" fill="#4b5563"/><circle cx="197" cy="13" r="13" fill="#fbbf24"/><circle cx="243" cy="13" r="13" fill="#4b5563"/><circle cx="289" cy="13" r="13" fill="#4b5563"/>
