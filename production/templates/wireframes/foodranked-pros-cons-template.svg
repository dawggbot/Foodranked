  <rect x="160" y="1280" width="760" height="120" rx="28" fill="#0f172a" stroke="#60a5fa" stroke-width="3" opacity="0.95"/>
  <text class="text" x="275" y="1350">Lifted subtitle zone for bullet sections</text>

  <g transform="translate(414,1710)">
    <circle cx="13" cy="13" r="13" fill="#4b5563"/><circle cx="59" cy="13" r="13" fill="#4b5563"/><circle cx="105" cy="13" r="13" fill="#4b5563"/><circle cx="151" cy="13" r="13" fill="#4b5563"/><circle cx="197" cy="13" r="13" fill="#4b5563"/><circle cx="243" cy="13" r="13" fill="#fbbf24"/><circle cx="289" cy="13" r="13" fill="#4b5563"/>
