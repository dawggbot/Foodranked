<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs><style>
    .bg{fill:#15131f}.zone{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:10 10}.panel{fill:#111827;stroke:#f59e0b;stroke-width:4}.text{fill:#fff;font:700 28px Arial,sans-serif}.note{fill:#9ca3af;font:22px Arial,sans-serif}.bullet{fill:#1f2937;stroke:#22c55e;stroke-width:3}.bullet-red{fill:#1f2937;stroke:#ef4444;stroke-width:3}.icon{fill:#374151}
  </style></defs>
  <rect class="bg" width="1080" height="1920"/>
  <rect class="zone" x="0" y="0" width="1080" height="300"/>
  <rect class="zone" x="0" y="300" width="1080" height="1020"/>
  <rect class="zone" x="80" y="1320" width="920" height="280"/>
  <rect class="zone" x="0" y="1670" width="1080" height="250"/>
  <rect x="20" y="40" width="1040" height="220" rx="24" class="panel"/>

  <rect x="60" y="330" width="220" height="52" rx="18" fill="#22c55e"/>
