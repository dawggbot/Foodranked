  <text class="text" x="300" y="1350">Verdict subtitle safe zone</text>

  <g transform="translate(414,1710)">
    <circle cx="13" cy="13" r="13" fill="#4b5563"/><circle cx="59" cy="13" r="13" fill="#4b5563"/><circle cx="105" cy="13" r="13" fill="#4b5563"/><circle cx="151" cy="13" r="13" fill="#4b5563"/><circle cx="197" cy="13" r="13" fill="#4b5563"/><circle cx="243" cy="13" r="13" fill="#4b5563"/><circle cx="289" cy="13" r="13" fill="#fbbf24"/>
  </g>
  <text class="note" x="70" y="1880">Main tweak points: stamp size, score plate position, ring size, subtitle gap.</text>
