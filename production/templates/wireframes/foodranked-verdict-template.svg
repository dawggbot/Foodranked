<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs><style>
    .bg{fill:#130f1f}.zone{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:10 10}.panel{fill:#111827;stroke:#f59e0b;stroke-width:4}.text{fill:#fff;font:700 28px Arial,sans-serif}.stamp{fill:#6d28d9;stroke:#f5d0fe;stroke-width:8}.score{fill:#1f2937;stroke:#fbbf24;stroke-width:4}.note{fill:#9ca3af;font:22px Arial,sans-serif}
  </style></defs>
  <rect class="bg" width="1080" height="1920"/>
  <rect class="zone" x="0" y="0" width="1080" height="300"/>
  <rect class="zone" x="0" y="300" width="1080" height="1020"/>
  <rect class="zone" x="80" y="1320" width="920" height="280"/>
  <rect class="zone" x="0" y="1670" width="1080" height="250"/>
  <rect x="20" y="40" width="1040" height="220" rx="24" class="panel"/>

  <circle cx="540" cy="820" r="250" fill="none" stroke="#a855f7" stroke-width="18" opacity="0.35"/>
